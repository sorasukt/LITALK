<!DOCTYPE html>
<html lang="th" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITALK Education - 404 Not Found</title>
    <meta name="description" content="ไม่พบหน้าที่ต้องการ - LITALK Education">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root[data-theme="light"] {
            --bg-primary: #f5f5f7;
            --bg-secondary: #ffffff;
            --border-color: #e2e2e7;
            --text-primary: #1d1d1f;
            --text-secondary: #515154;
            --text-muted: #86868b;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04);
            --brand-gradient: linear-gradient(135deg, #18181b 0%, #000000 100%);
            --brand-btn-text: #ffffff;
        }

        :root[data-theme="dark"] {
            --bg-primary: #000000;
            --bg-secondary: #121212;
            --border-color: #2c2c2e;
            --text-primary: #ffffff;
            --text-secondary: #d1d1d6;
            --text-muted: #8e8e93;
            --shadow-md: 0 10px 30px rgba(0, 0, 0, 0.4);
            --brand-gradient: linear-gradient(135deg, #ffffff 0%, #eaeaea 100%);
            --brand-btn-text: #000000;
        }

        body {
            font-family: 'Kanit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            transition: background-color 0.3s, color 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* Dotted Grid Background */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle at 50% 0%, rgba(0, 0, 0, 0.03) 0%, transparent 50%),
                radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 100% 100%, 24px 24px;
            pointer-events: none;
            z-index: 0;
        }

        :root[data-theme="dark"] body::before {
            background-image:
                radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.03) 0%, transparent 60%),
                radial-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px);
        }

        .error-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 440px;
            text-align: center;
            background-color: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 48px 36px;
            box-shadow: var(--shadow-md);
            transition: background-color 0.3s, border-color 0.3s;
        }

        .logo-img {
            height: 48px;
            width: auto;
            margin-bottom: 32px;
            transition: filter 0.3s;
        }

        :root[data-theme="dark"] .logo-img {
            filter: brightness(0) invert(1);
        }

        .error-code {
            font-size: 96px;
            font-weight: 800;
            line-height: 1;
            letter-spacing: -0.05em;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--text-primary) 30%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .error-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .error-desc {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 36px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px 24px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: var(--brand-gradient);
            color: var(--brand-btn-text);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            margin-top: 12px;
        }

        .btn-secondary:hover {
            background-color: var(--bg-primary);
        }

        /* Top Theme Toggle Switch */
        .theme-toggle-container {
            position: absolute;
            top: 24px;
            right: 24px;
            z-index: 100;
        }

        .theme-toggle-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.2s;
        }

        .theme-toggle-btn:hover {
            background-color: var(--bg-secondary);
            border-color: var(--text-primary);
        }
    </style>
</head>

<body>

    <!-- Theme toggle -->
    <div class="theme-toggle-container">
        <button class="theme-toggle-btn" onclick="toggleTheme()" aria-label="Toggle Theme">
            <i id="theme-toggle-icon" class="fas fa-moon"></i>
        </button>
    </div>

    <!-- 404 Container -->
    <div class="error-container">
        <img src="img/LITALK-Black.png" alt="LITALK Logo" class="logo-img">
        <div class="error-code">404</div>
        <h1 class="error-title">ไม่พบหน้าที่คุณต้องการ</h1>
        <p class="error-desc">ลิงก์ที่คุณเข้าถึงอาจจะไม่ถูกต้อง หรือหน้าเว็บดังกล่าวถูกย้ายหรือลบไปเรียบร้อยแล้ว
            กรุณาตรวจสอบลิงก์อีกครั้ง</p>

        <a href="/LITALK" class="btn btn-primary">
            <i class="fas fa-home"></i>
            กลับสู่หน้าหลักนักเรียน
        </a>
        <a href="https://lin.ee/n4zLBXa" target="_blank" class="btn btn-secondary">
            <i class="fab fa-line"></i>
            ติดต่อฝ่ายสนับสนุนทาง Line
        </a>
    </div>

    <script>
        // Init theme function before page loads to prevent flickering
        (function () {
            const savedTheme = localStorage.getItem('theme');
            const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', theme);

            // Set correct icon after DOM load
            window.addEventListener('DOMContentLoaded', () => {
                const icon = document.getElementById('theme-toggle-icon');
                if (icon) {
                    icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
                }
            });
        })();

        // Theme Toggle Logic
        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            const icon = document.getElementById('theme-toggle-icon');
            if (icon) {
                icon.className = newTheme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
    </script>
</body>

</html>
